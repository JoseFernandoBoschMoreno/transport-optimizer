{% extends 'base.html' %}
{% block title %}Usuarios{% endblock %}
{% block content %}
<h2>Usuarios</h2>
<a href="{{ url_for('users.create') }}" class="btn btn-primary mb-3">Nuevo usuario</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th><th>Usuario</th><th>Email</th><th>Rol</th><th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.username }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.role }}</td>
            <td>
                <a href="{{ url_for('users.edit', user_id=u.id) }}" class="btn btn-sm btn-secondary">Editar</a>
                <form method="post" action="{{ url_for('users.delete', user_id=u.id) }}" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar usuario?');">Eliminar</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
